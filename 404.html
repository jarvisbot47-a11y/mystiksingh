<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Mystik</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #020207;
      color: #f1f0f5;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(100px, 20vw, 200px);
      font-weight: 800;
      background: linear-gradient(135deg, #f1f0f5, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 0.85;
    }
    p { color: #9898b0; font-size: 16px; margin: 24px 0 40px; }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      color: #fff;
      border-radius: 100px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>This page doesn't exist. Back to Mystik.</p>
    <a href="/">Return Home</a>
  </div>
</body>
</html>
